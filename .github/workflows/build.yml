name: Build

on: 
  push:
    branches:
      - main

env:
  FPC_VER: release_3_2_2
  LAZ_VER: lazarus_2_2_4
      
jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:            
          - name: Windows 64
            os: windows-latest
            build-mode: WIN64
            binary: libtpaex64.dll
            
          - name: Windows 32
            os: windows-latest
            build-mode: WIN32
            binary: libtpaex32.dll

          - name: Linux 64
            os: ubuntu-latest
            build-mode: LINUX64
            binary: libtpaex64.so
          
          - name: Linux AArch64  
            os: ubuntu-latest
            build-mode: LINUX-AARCH64
            binary: libtpaex64.so.aarch64
            
          - name: MacOS 64
            os: macos-latest
            build-mode: MACOS
            binary: libtpaex64.dylib

          - name: MacOS AArch64
            os: macos-latest
            build-mode: MACOS-AARCH64
            binary: libtpaex64.dylib.aarch64
         
    steps:
      - name: checkout
        uses: actions/checkout@v4.2.2
      
      - name: Install FPC and Lazarus
        shell: bash
        run: |
          echo "Installing Lazarus and FPC..."
          FPCCUP_DIR="${HOME}/fpcupdeluxe"
          mkdir -p "${FPCCUP_DIR}"

          case "${{ runner.os }}" in
            Windows)
              powershell -command "Invoke-WebRequest -Uri 'https://github.com/LongDirtyAnimAlf/fpcupdeluxe/releases/download/v1.9.1/fpcupdeluxe-x86_64-win64.zip' -OutFile '${FPCCUP_DIR}/fpcupdeluxe.zip'; Expand-Archive -Path '${FPCCUP_DIR}/fpcupdeluxe.zip' -DestinationPath '${FPCCUP_DIR}' -Force"
              FPCCUP_CMD="${FPCCUP_DIR}/fpcupdeluxe.exe"
              ;;
            Linux)
              curl -sL "https://github.com/LongDirtyAnimAlf/fpcupdeluxe/releases/download/v1.9.1/fpcupdeluxe-x86_64-linux" -o "${FPCCUP_DIR}/fpcupdeluxe"
              chmod +x "${FPCCUP_DIR}/fpcupdeluxe"
              FPCCUP_CMD="${FPCCUP_DIR}/fpcupdeluxe"
              ;;
            macOS)
              curl -sL "https://github.com/LongDirtyAnimAlf/fpcupdeluxe/releases/download/v1.9.1/fpcupdeluxe-x86_64-darwin" -o "${FPCCUP_DIR}/fpcupdeluxe"
              chmod +x "${FPCCUP_DIR}/fpcupdeluxe"
              FPCCUP_CMD="${FPCCUP_DIR}/fpcupdeluxe"
              ;;
          esac

          "$FPCCUP_CMD" --fpc="${{ env.FPC_VER }}" --laz="${{ env.LAZ_VER }}"
          
          if [ "${{ matrix.config.build-mode }}" == "WIN32" ]; then
            echo "Installing Windows 32-bit cross-compiler..."
            "$FPCCUP_CMD" --onlycross --fpc="${{ env.FPC_VER }}" --target-os=win64 --target-cpu=i386
          elif [ "${{ matrix.config.build-mode }}" == "LINUX-AARCH64" ]; then
            echo "Installing Linux AArch64 cross-compiler..."
            "$FPCCUP_CMD" --onlycross --fpc="${{ env.FPC_VER }}" --target-os=linux --target-cpu=aarch64
          elif [ "${{ matrix.config.build-mode }}" == "MACOS-AARCH64" ]; then
            echo "Installing macOS AArch64 cross-compiler..."
            "$FPCCUP_CMD" --onlycross --fpc="${{ env.FPC_VER }}" --target-os=darwin --target-cpu=aarch64
          fi

          echo "${HOME}/lazarus/laz.bin" >> "${GITHUB_PATH}"
          
      - name: Build Library tpaex
        run: |
          lazbuild --build-mode=${{ matrix.config.build-mode }} tpaex.lpi

      - name: Upload Binary 
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.binary }}
          path: ${{ matrix.config.binary }}