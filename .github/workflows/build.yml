name: Build

on: 
  push:
    branches:
      - master

env:
  FPC_VER: release_3_2_2
  LAZ_VER: lazarus_2_2_4
      
jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:            
          - name: Windows 64
            os: windows-latest
            build-mode: WIN64
            binary: libtpaex64.dll
            
          - name: Windows 32
            os: windows-latest
            build-mode: WIN32
            binary: libtpaex32.dll

          - name: Linux 64
            os: ubuntu-latest
            build-mode: LINUX64
            binary: libtpaex64.so
          
          - name: Linux AArch64  
            os: ubuntu-latest
            build-mode: LINUX-AARCH64
            binary: libtpaex64.so.aarch64
            
          - name: MacOS 64
            os: macos-latest
            build-mode: MACOS
            binary: libtpaex64.dylib

          - name: MacOS AArch64
            os: macos-latest
            build-mode: MACOS-AARCH64
            binary: libtpaex64.dylib.aarch64
         
    steps:
      - name: checkout
      - uses: actions/checkout@v4.2.2
      
      - name: Install Lazarus + FPC (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc fpc-src lazarus
      
      - name: Install Lazarus + FPC
        run: echo "Installing Lazarus and FPC..."
        shell: bash

      - name: Install Lazarus + FPC (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc fpc-src lazarus

      - name: Install Lazarus + FPC (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L -o fpc.pkg https://downloads.sourceforge.net/project/lazarus/Lazarus%20macOS%20x86-64/${{ env.LAZ_VER }}/fpc-3.2.2.intelarm64-macosx.dmg
          curl -L -o lazarus.pkg https://downloads.sourceforge.net/project/lazarus/Lazarus%20macOS%20x86-64/${{ env.LAZ_VER }}/lazarus-2.2.4-macosx-x86_64.pkg
          sudo installer -pkg fpc.pkg -target /
          sudo installer -pkg lazarus.pkg -target /

      - name: Install Lazarus + FPC (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install lazarus --version=2.2.4 -y
          choco install fpc --version=3.2.2 -y
          
      - name: Build Library tpaex
        run: |
          lazbuild --build-mode=${{ matrix.config.build-mode }} tpaex.lpi

      - name: Upload Binary 
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.binary }}
          path: ${{ matrix.config.binary }}