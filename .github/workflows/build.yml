name: Build

on: 
  push:
    branches:
      - master
      
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { mode: LINUX64,    bin: libtpaex64.so }
          - { mode: LINUX-AARCH64, bin: libtpaex64.so.aarch64 }
          - { mode: WIN64,      bin: libtpaex64.dll }
          - { mode: WIN32,      bin: libtpaex32.dll }
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc fpc-src lazarus \
              gcc-multilib gcc-mingw-w64-i686 gcc-mingw-w64-x86-64

      - name: Build ${{ matrix.target.mode }}
        run: lazbuild --build-mode=${{ matrix.target.mode }} tpaex.lpi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.bin }}
          path: ${{ matrix.target.bin }}